<section>
    <h2> Contacto </h2>
    <input type="text" placeholder="Nombre" [(ngModel)]="nombre">
    <input type="email" placeholder="Correo" [(ngModel)]="email">
    <textarea placeholder="Mensaje" [(ngModel)] ="mensaje"></textarea>
    <br><br>

    <button (click)="enviar()">Enviar</button>
</section>
